<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IT Department Waiting Room</title>

  <!-- External CSS -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Spotify SDK -->
  <script src="https://sdk.scdn.co/spotify-player.js"></script>
</head>
<body>
  <!-- Background Canvas -->
  <canvas id="background-canvas"></canvas>

  <!-- Main Container -->
  <div class="container">
    <header>
      <h1>Welcome to the IT Department</h1>
      <p>Enjoy the music and meet our team while you wait!</p>
    </header>

    <!-- Navigation Buttons -->
    <div class="custom-nav">
      <button onclick="document.getElementById('team').scrollIntoView({behavior: 'smooth'})">Team</button>
      <button onclick="document.getElementById('spotify').scrollIntoView({behavior: 'smooth'})">Spotify</button>
      <button onclick="window.location.href='https://example.com';">External Link</button>
    </div>

    <!-- Team Section -->
    <section class="team-section" id="team">
      <h2>Meet the Team</h2>
      <div class="team">
        <div class="team-member">
          <img src="Photos/buttercup.jpg" alt="Arlene Alvarado" />
          <div class="info">
            <h3>Arlene Alvarado</h3>
            <p>Bot</p>
          </div>
        </div>
        <div class="team-member">
          <img src="https://via.placeholder.com/280x200" alt="Seth McCullar" />
          <div class="info">
            <h3>Seth McCullar</h3>
            <p>System Administrator</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Live Spotify Player -->
    <section class="spotify" id="spotify">
      <h2>Now Playing</h2>
      <div class="player-ui">
        <img id="albumArt" src="" alt="Album Art" width="220" />
        <h2 id="trackName">Track Name</h2>
        <h4 id="artistName">Artist Name</h4>

        <div class="controls">
          <button id="shuffleButton">Enable Shuffle</button>
          <button id="playPauseButton">Pause</button>
          <button id="nextBtn">Next</button>
          <button id="prevBtn">Previous</button>
          <button id="repeatBtn">Repeat Off</button>
          <label for="volumeControl">Volume:</label>
          <input type="range" id="volumeControl" min="0" max="100" value="50" />
        </div>
      </div>
    </section>
  </div>

  <!-- Your JS Code -->
  <script src="script.js"></script>
</body>
</html>
